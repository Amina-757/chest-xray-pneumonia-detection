apiVersion: apps/v1
kind: Deployment
metadata:
  name: chest-xray-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chest-xray-api
  template:
    metadata:
      labels:
        app: chest-xray-api
    spec:
      containers:
      - name: api
        image: chest-xray-pneumonia:v1
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_PATH
          value: "/app/checkpoints/improved_cnn_final.keras"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
